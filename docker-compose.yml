services:
  chess:
    build: .
    command: uv run --frozen uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    environment:
      MIMI_SECRET: ${MIMI_SECRET:-dev-mimi-secret}
      CORE_URL: ${CORE_URL:-}
      SELF_BACKEND_URL: ${SELF_BACKEND_URL:-}
      SELF_FRONTEND_URL: ${SELF_FRONTEND_URL:-}
      SELF_NAME: ${SELF_NAME:-Шахматы}
    env_file:
      - ../../.env
    volumes:
      - .:/app
      - /app/.venv
