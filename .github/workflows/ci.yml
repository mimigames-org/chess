name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool run ruff check .

  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv tool run ty check .

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv tool run pip-audit

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest --cov --cov-report=xml --cov-fail-under=75
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
      - name: Check diff coverage (80% minimum)
        if: github.event_name == 'pull_request'
        run: |
          uv run pip install diff-cover
          uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=80

  trigger-e2e:
    name: Trigger e2e tests
    needs: [lint, typecheck, test, audit]
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_PAT }}
          repository: mimigames-org/e2e
          event-type: service-updated
          client-payload: |
            {
              "service": "chess",
              "sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}"
            }
